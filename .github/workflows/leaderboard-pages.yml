name: Publish leaderboard JSON

on:
  push:
    branches:
      - main
    paths:
      - scores/**
      - .github/workflows/leaderboard-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static leaderboard
        run: |
          mkdir -p public/scores
          cp scores/leaderboard.json public/scores/leaderboard.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
